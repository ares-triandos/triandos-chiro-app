name: Build and Deploy

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build iOS app
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: npx eas-cli build --platform ios --profile preview --wait

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: npx eas-cli submit --platform ios --profile preview --latest --wait
