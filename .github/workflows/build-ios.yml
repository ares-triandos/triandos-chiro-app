name: Build iOS & Submit to TestFlight

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install npm dependencies
        run: npm install

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          gem install cocoapods
          pod install --repo-update

      - name: Setup Fastlane
        working-directory: ios
        run: bundle install

      - name: Build and submit to TestFlight
        working-directory: ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          CI: true
          FASTLANE_USER: ${{ secrets.APPLE_ID }}
          FASTLANE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: bundle exec fastlane ios build_testflight --verbose

      - name: Notify on success
        if: success()
        run: echo "✅ Build complete and submitted to TestFlight"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Build failed - check logs above"
